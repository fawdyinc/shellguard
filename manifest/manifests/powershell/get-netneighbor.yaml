name: get-netneighbor
description: Retrieve IP neighbor cache (ARP/NDP) entries
category: network
shell: powershell
flags:
  - flag: "-IPAddress"
    takes_value: true
  - flag: "-InterfaceIndex"
    takes_value: true
  - flag: "-InterfaceAlias"
    takes_value: true
  - flag: "-AddressFamily"
    takes_value: true
  - flag: "-State"
    takes_value: true
stdin: false
stdout: true
