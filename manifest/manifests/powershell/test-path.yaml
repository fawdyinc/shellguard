name: test-path
description: Test whether a path exists
category: filesystem
shell: powershell
flags:
  - flag: "-Path"
    takes_value: true
  - flag: "-PathType"
    takes_value: true
  - flag: "-LiteralPath"
    takes_value: true
  - flag: "-Filter"
    takes_value: true
  - flag: "-Include"
    takes_value: true
  - flag: "-Exclude"
    takes_value: true
  - flag: "-IsValid"
  - flag: "-OlderThan"
    takes_value: true
  - flag: "-NewerThan"
    takes_value: true
stdin: false
stdout: true
