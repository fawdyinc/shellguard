name: sort-object
description: Sort objects by property values
category: utility
shell: powershell
flags:
  - flag: "-Property"
    takes_value: true
  - flag: "-Descending"
  - flag: "-Unique"
  - flag: "-Top"
    takes_value: true
  - flag: "-Bottom"
    takes_value: true
  - flag: "-CaseSensitive"
  - flag: "-Stable"
  - flag: "-Culture"
    takes_value: true
stdin: true
stdout: true
