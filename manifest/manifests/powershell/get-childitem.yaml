name: get-childitem
description: List directory contents
category: filesystem
shell: powershell
flags:
  - flag: "-Path"
    takes_value: true
  - flag: "-Recurse"
  - flag: "-Filter"
    takes_value: true
  - flag: "-LiteralPath"
    takes_value: true
  - flag: "-Name"
  - flag: "-Force"
  - flag: "-File"
  - flag: "-Directory"
  - flag: "-Hidden"
  - flag: "-ReadOnly"
  - flag: "-System"
  - flag: "-Include"
    takes_value: true
  - flag: "-Exclude"
    takes_value: true
  - flag: "-Depth"
    takes_value: true
  - flag: "-FollowSymlink"
allows_path_args: true
stdin: false
stdout: true
