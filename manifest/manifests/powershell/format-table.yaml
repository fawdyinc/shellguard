name: format-table
description: Format output as a table
category: utility
shell: powershell
flags:
  - flag: "-Property"
    takes_value: true
  - flag: "-AutoSize"
  - flag: "-Wrap"
  - flag: "-GroupBy"
    takes_value: true
  - flag: "-HideTableHeaders"
  - flag: "-RepeatHeader"
  - flag: "-View"
    takes_value: true
  - flag: "-ShowError"
stdin: true
stdout: true
