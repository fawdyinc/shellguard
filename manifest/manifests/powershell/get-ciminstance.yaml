name: get-ciminstance
description: Query WMI/CIM instances (modern replacement for Get-WmiObject)
category: system
shell: powershell
flags:
  - flag: "-ClassName"
    takes_value: true
  - flag: "-Query"
    takes_value: true
  - flag: "-Filter"
    takes_value: true
  - flag: "-Namespace"
    takes_value: true
  - flag: "-ComputerName"
    takes_value: true
  - flag: "-MethodName"
    deny: true
    reason: "Method invocation is a write-capable operation. Not allowed."
stdin: false
stdout: true
