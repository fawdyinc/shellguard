name: get-filehash
description: Compute a cryptographic hash for a file
category: filesystem
shell: powershell
flags:
  - flag: "-Path"
    takes_value: true
  - flag: "-LiteralPath"
    takes_value: true
  - flag: "-Algorithm"
    takes_value: true
  - flag: "-InputStream"
    takes_value: true
allows_path_args: true
stdin: true
stdout: true
