name: get-help
description: Display help for a cmdlet or concept
category: utility
shell: powershell
flags:
  - flag: "-Name"
    takes_value: true
  - flag: "-Full"
  - flag: "-Detailed"
  - flag: "-Examples"
  - flag: "-Parameter"
    takes_value: true
  - flag: "-Category"
    takes_value: true
  - flag: "-Online"
  - flag: "-ShowWindow"
stdin: false
stdout: true
