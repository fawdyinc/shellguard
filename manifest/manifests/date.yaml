name: date
description: Print or set the system date and time (read-only here; -s/--set denied)
category: system_info
flags:
  - flag: "-u"
  - flag: "--utc"
  - flag: "--universal"
  - flag: "-R"
  - flag: "--rfc-email"
  - flag: "-I"
    takes_value: true
  - flag: "--iso-8601"
    takes_value: true
  - flag: "-r"
    takes_value: true
  - flag: "--reference"
    takes_value: true
  - flag: "-d"
    takes_value: true
  - flag: "--date"
    takes_value: true
  - flag: "--rfc-3339"
    takes_value: true
  - flag: "--debug"
  - flag: "--help"
  - flag: "--version"
  - flag: "-s"
    deny: true
    reason: "Setting the system clock is not allowed"
  - flag: "--set"
    deny: true
    reason: "Setting the system clock is not allowed"
stdin: false
stdout: true
